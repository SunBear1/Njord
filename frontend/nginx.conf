server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets emitted by Vite (file names contain a hash).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-asset route returns index.html so React Router
    # can pick it up client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Liveness/readiness target. nginx itself is the probe — no upstream.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
