name: Build and Test

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "infrastructure/**"
      - "data/**"
      - ".github/agents/**"
      - ".github/copilot-instructions.md"
      - ".github/copilot-setup-steps.yml"
      - ".github/dependabot.yml"
      - ".github/instructions/**"
      - ".github/skills/**"
  pull_request:
    branches: ["*"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "infrastructure/**"
      - "data/**"
      - ".github/agents/**"
      - ".github/copilot-instructions.md"
      - ".github/copilot-setup-steps.yml"
      - ".github/dependabot.yml"
      - ".github/instructions/**"
      - ".github/skills/**"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/lint.job.yaml

  test:
    uses: ./.github/workflows/test.job.yaml

  build:
    uses: ./.github/workflows/build.job.yaml

  smoke-tests:
    needs: [lint, test, build]
    uses: ./.github/workflows/smoke-tests.job.yaml
