name: Scrape Finance Data

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_FINANCE_DB_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Scrape bonds data
        run: npx tsx scripts/scrapers/scrape-bonds.ts

      - name: Fetch GUS CPI data
        run: npx tsx scripts/scrapers/fetch-gus-cpi.ts

      - name: Fetch NBP forecast data
        run: npx tsx scripts/scrapers/fetch-nbp-forecast.ts
