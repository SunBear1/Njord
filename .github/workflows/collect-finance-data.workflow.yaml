name: Scrape Finance Data

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.TF_CF_API_KEY }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Read FINANCE_DB ID from wrangler.toml
        run: |
          DB_ID=$(grep -A2 'binding = "FINANCE_DB"' wrangler.toml | grep database_id | cut -d'"' -f2)
          echo "CF_D1_DATABASE_ID=$DB_ID" >> "$GITHUB_ENV"

      - name: Scrape bonds data
        run: npx tsx scripts/scrapers/scrape-bonds.ts

      - name: Fetch GUS CPI data
        run: npx tsx scripts/scrapers/fetch-gus-cpi.ts

      - name: Fetch NBP forecast data
        run: npx tsx scripts/scrapers/fetch-nbp-forecast.ts
