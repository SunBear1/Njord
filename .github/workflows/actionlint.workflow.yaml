name: Actionlint

on:
  pull_request:
    branches: ["*"]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint workflow files
        uses: raven-actions/actionlint@v2
