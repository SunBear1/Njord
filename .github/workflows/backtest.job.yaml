name: Prediction Engine Backtest

on:
  workflow_call:

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.NJORD_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.NJORD_AUTOMATION_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: ./.github/actions/setup

      - name: Run NASDAQ backtest
        run: npm run test:backtest | tee backtest-report.txt

      - name: Append metrics to time-series history
        if: ${{ !cancelled() }}
        run: node scripts/ci/append-backtest-metrics.cjs

      - name: Create Pull Request with updated metrics
        if: ${{ !cancelled() }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: backtest metrics ${{ github.run_id }}"
          branch: chore/backtest-metrics
          title: "chore: daily backtest metrics"
          body: |
            Automated daily backtest metrics update.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          add-paths: |
            data/backtest-history.csv
          delete-branch: true

      - name: Enable auto-merge
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER=$(gh pr list --head chore/backtest-metrics --json number -q '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --auto --squash
          fi

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: backtest-report-${{ github.run_id }}
          path: |
            backtest-report.txt
            backtest-misses.json
          retention-days: 30
