name: Prediction Engine Backtest

on:
  workflow_call:

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # PAT triggers CI on created PRs; GITHUB_TOKEN doesn't (GitHub anti-loop rule)
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: ./.github/actions/setup

      - name: Run NASDAQ backtest
        run: npm run test:backtest | tee backtest-report.txt

      - name: Append metrics to time-series history
        if: ${{ !cancelled() }}
        run: node scripts/ci/append-backtest-metrics.cjs

      - name: Open PR with updated history
        if: ${{ !cancelled() }}
        run: bash scripts/ci/create-backtest-pr.sh
        env:
          GH_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: backtest-report-${{ github.run_id }}
          path: |
            backtest-report.txt
            backtest-misses.json
          retention-days: 30
