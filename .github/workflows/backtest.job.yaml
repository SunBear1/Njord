name: Prediction Engine Backtest

on:
  workflow_call:

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: ./.github/actions/setup

      - name: Run NASDAQ backtest
        run: npm run test:backtest | tee backtest-report.txt

      - name: Append metrics to time-series history
        if: ${{ !cancelled() }}
        run: node scripts/ci/append-backtest-metrics.cjs

      - name: Push updated history to main
        if: ${{ !cancelled() }}
        run: bash scripts/ci/create-backtest-pr.sh

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: backtest-report-${{ github.run_id }}
          path: |
            backtest-report.txt
            backtest-misses.json
          retention-days: 30
