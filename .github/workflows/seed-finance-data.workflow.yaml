name: Seed Finance Data

on:
  push:
    branches: [main]
    paths:
      - 'data/polish_treasury_bonds.csv'
      - 'data/nbp-inflation-forecast.csv'
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.TF_CF_API_KEY }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Read FINANCE_DB ID from wrangler.toml
        run: |
          DB_ID=$(grep -A2 'binding = "FINANCE_DB"' wrangler.toml | grep database_id | cut -d'"' -f2)
          echo "CF_D1_DATABASE_ID=$DB_ID" >> "$GITHUB_ENV"

      - name: Seed bonds from CSV
        run: npx tsx scripts/scrapers/scrape-bonds.ts

      - name: Seed NBP inflation forecast from CSV
        run: npx tsx scripts/scrapers/fetch-nbp-forecast.ts
