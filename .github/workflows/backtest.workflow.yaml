name: Scheduled Backtest

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # manual trigger from Actions tab

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  backtest:
    uses: ./.github/workflows/backtest.job.yaml
    secrets: inherit
