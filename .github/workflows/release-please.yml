name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Single VERSION-only release; no package publication.
          # Cloud-side image push (ghcr.io) is deferred to Epic 99.
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
