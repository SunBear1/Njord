name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run test:coverage
      - run: npm run build
      - name: Type-check functions/
        run: npx tsc --noEmit --skipLibCheck -p functions/tsconfig.json
      - name: Security audit (high+ severity)
        # warn-only for now; tighten to --audit-level=high once SheetJS CVE resolved
        run: npm audit --omit=dev --audit-level=critical || true
      - name: Bundle size check
        run: |
          BUNDLE=$(find dist/assets -name 'index-*.js' | head -1)
          SIZE=$(wc -c < "$BUNDLE")
          MAX=$((250 * 1024))
          echo "Main bundle: $((SIZE / 1024)) KB (limit: $((MAX / 1024)) KB)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "❌ Main bundle exceeds 250 KB limit!" && exit 1
          else
            echo "✅ Bundle size OK"
          fi

  e2e:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - run: npm run build
      - name: Run Playwright smoke tests
        run: npx playwright test
