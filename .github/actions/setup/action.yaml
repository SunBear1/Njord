name: Setup Node.js environment
description: Checkout repository, install Node.js 22, and install npm dependencies

inputs:
  token:
    description: GitHub token passed to actions/checkout (required when the job pushes back to the repo)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        token: ${{ inputs.token || github.token }}

    - uses: actions/setup-node@v6
      with:
        node-version: "22"

    - run: npm ci
      shell: bash
