version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "08:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      dev-tools:
        patterns:
          - "eslint*"
          - "@typescript-eslint*"
          - "vitest"
          - "vite"
          - "@vitejs/*"
          - "typescript"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "08:00"
    labels:
      - "dependencies"
