# Environment setup for GitHub Copilot coding agent
# This configures the sandbox where the cloud agent runs
# Docs: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

steps:
  - uses: actions/setup-node@v4
    with:
      node-version: '22'
  - run: npm ci
