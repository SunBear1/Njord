# Required secrets (set via `wrangler pages secret put <NAME>`):
#   JWT_SECRET             — signing key for auth tokens
#   GITHUB_CLIENT_ID       — GitHub OAuth app client ID
#   GITHUB_CLIENT_SECRET   — GitHub OAuth app client secret
#   GOOGLE_CLIENT_ID       — Google OAuth client ID
#   GOOGLE_CLIENT_SECRET   — Google OAuth client secret
#   TWELVE_DATA_API_KEY    — (optional) fallback market-data provider when Yahoo Finance returns 429

name = "njord"
pages_build_output_dir = "dist"
compatibility_date = "2025-11-01"

[[d1_databases]]
binding = "DB"
database_name = "njord-users-db"
database_id = "7557d670-0d6f-4959-b99d-94b9368dc53d"

[[d1_databases]]
binding = "FINANCE_DB"
database_name = "finance-data-db"
database_id = "fc369dfb-cbc6-4bd3-a213-d582a0bcd8f1"
