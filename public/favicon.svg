<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>

  <!-- Mast -->
  <rect x="30.5" y="14" width="2.5" height="26" rx="1" fill="#e2e8f0"/>

  <!-- Sail with vertical stripes -->
  <path d="M33 15 L46 24 L33 34 Z" fill="#3b82f6"/>
  <path d="M33 15 L39.5 19.5 L39.5 29.5 L33 34 Z" fill="#60a5fa"/>
  <path d="M33 15 L43 21.5 L43 27.5 L33 34 Z" fill="#2563eb" opacity="0.5"/>

  <!-- Hull — boat shape -->
  <path d="M10 38 Q18 34 33 34 Q48 34 52 38 Q48 47 33 49 Q18 47 10 38 Z" fill="#1d4ed8"/>
  <path d="M10 38 Q18 36 33 36 Q48 36 52 38" fill="none" stroke="#60a5fa" stroke-width="1.2"/>

  <!-- Dragon head (prow) pointing right -->
  <path d="M52 38 L60 32 L58 37 L62 35 L58 41 L54 42 Z" fill="#3b82f6"/>
  <circle cx="60" cy="32" r="1.2" fill="#fbbf24"/>

  <!-- Stern curl (left) -->
  <path d="M10 38 C8 36 6 38 8 41 C9 43 11 42 10 40" fill="#3b82f6"/>

  <!-- Oars — 4 on bottom -->
  <line x1="18" y1="42" x2="16" y2="52" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="44" x2="23" y2="54" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="44" x2="41" y2="54" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="42" x2="48" y2="52" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Waves below -->
  <path d="M6 54 Q14 51 22 54 Q30 57 38 54 Q46 51 56 54" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
