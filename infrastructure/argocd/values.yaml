# ArgoCD app-of-apps for Njord.
#
# Operators normally never edit this directly: it's rendered by a one-shot
# `helm template ... | kubectl apply` and from then on ArgoCD owns the
# children via the root Application's selfHeal loop.

global:
  repoURL: https://github.com/SunBear1/Njord
  targetRevision: main
  argocdNamespace: argocd

# Child Applications. Order matters only for the first sync: ArgoCD picks
# up `sync-wave` annotations so platform → postgres → backend → frontend.
children:
  - name: app-platform
    chartPath: infrastructure/helm/njord-platform
    destinationNamespace: njord-system
    syncWave: "0"
    values: {}
  - name: app-postgres
    chartPath: infrastructure/helm/njord-postgres
    destinationNamespace: njord-data
    syncWave: "1"
    values: {}
    # The postgres chart generates POSTGRES_PASSWORD via `helm lookup` so
    # it stays stable across local `helm upgrade`. The ArgoCD repo server
    # cannot evaluate `lookup`, so each render generates a fresh random
    # password — perpetual drift unless we ignore it. The StatefulSet
    # entries cover server-managed defaults and the pod-template
    # checksum annotations whose values transitively depend on the
    # same secret render.
    ignoreDifferences:
      - kind: Secret
        name: postgres-secret
        jsonPointers:
          - /data/POSTGRES_PASSWORD
          - /data/POSTGRES_USER
          - /data/POSTGRES_DB
      - group: apps
        kind: StatefulSet
        name: postgres
        jsonPointers:
          - /spec/podManagementPolicy
          - /spec/revisionHistoryLimit
          - /spec/persistentVolumeClaimRetentionPolicy
          - /spec/template/metadata/annotations/checksum~1secret
          - /spec/template/metadata/annotations/checksum~1config
  - name: app-backend
    chartPath: infrastructure/helm/njord-backend
    destinationNamespace: njord-app
    syncWave: "2"
    values: {}
    # njord-auth-secret and the mirrored postgres-secret in njord-app
    # both use `lookup` for stable values, same caveat as above.
    ignoreDifferences:
      - kind: Secret
        name: njord-auth-secret
        jsonPointers:
          - /data/JWT_SECRET
      - kind: Secret
        name: postgres-secret
        jsonPointers:
          - /data/POSTGRES_PASSWORD
          - /data/POSTGRES_USER
          - /data/POSTGRES_DB
      - group: apps
        kind: Deployment
        name: backend
        jsonPointers:
          - /spec/template/metadata/annotations/checksum~1secret
  - name: app-frontend
    chartPath: infrastructure/helm/njord-frontend
    destinationNamespace: njord-app
    syncWave: "2"
    values: {}
