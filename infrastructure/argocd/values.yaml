# ArgoCD app-of-apps for Njord.
#
# Operators normally never edit this directly: it's rendered by a one-shot
# `helm template ... | kubectl apply` and from then on ArgoCD owns the
# children via the root Application's selfHeal loop.

global:
  repoURL: https://github.com/SunBear1/Njord
  targetRevision: main
  argocdNamespace: argocd

# Child Applications. Order matters only for the first sync: ArgoCD picks
# up `sync-wave` annotations so platform → postgres → backend → frontend.
children:
  - name: app-platform
    chartPath: infrastructure/helm/njord-platform
    destinationNamespace: njord-system
    syncWave: "0"
    values: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  - name: app-postgres
    chartPath: infrastructure/helm/njord-postgres
    destinationNamespace: njord-data
    syncWave: "1"
    values: {}
    # ServerSideApply is intentionally OFF for postgres: SSA leaves
    # server-managed StatefulSet defaults (updateStrategy, dnsPolicy,
    # terminationGracePeriodSeconds, volumeClaimTemplates.kind/apiVersion,
    # etc.) in the live object that don't appear in `helm template`,
    # producing permanent OOS noise. The pre-3-way-merge client-side
    # apply path ignores server defaults via last-applied-configuration.
    syncOptions:
      - CreateNamespace=true
    # The postgres chart generates POSTGRES_PASSWORD via `helm lookup` so
    # it stays stable across local `helm upgrade`. The ArgoCD repo server
    # cannot evaluate `lookup`, so each render generates a fresh random
    # value — perpetual drift unless we ignore the secret data.
    ignoreDifferences:
      - kind: Secret
        name: postgres-secret
        jsonPointers:
          - /data/POSTGRES_PASSWORD
          - /data/POSTGRES_USER
          - /data/POSTGRES_DB
  - name: app-backend
    chartPath: infrastructure/helm/njord-backend
    destinationNamespace: njord-app
    syncWave: "2"
    values: {}
    syncOptions:
      - CreateNamespace=true
    # njord-auth-secret + mirrored postgres-secret both use `helm lookup`
    # for stable values. Same caveat as app-postgres.
    ignoreDifferences:
      - kind: Secret
        name: njord-auth-secret
        jsonPointers:
          - /data/JWT_SECRET
      - kind: Secret
        name: postgres-secret
        jsonPointers:
          - /data/POSTGRES_PASSWORD
          - /data/POSTGRES_USER
          - /data/POSTGRES_DB
  - name: app-frontend
    chartPath: infrastructure/helm/njord-frontend
    destinationNamespace: njord-app
    syncWave: "2"
    values: {}
    syncOptions:
      - CreateNamespace=true
