# Default values for njord-postgres.
# Story 0.3 — single-replica Postgres on local-path PVC.

postgres:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  # Single replica StatefulSet — multi-replica replication is out of scope (Epic 0).
  replicaCount: 1

  service:
    port: 5432

  persistence:
    enabled: true
    storageClassName: local-path
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Pin Postgres to the db-control node (mirrors planned OCI A1.Flex topology).
  nodeSelector:
    role: db-control

  tolerations: []
  affinity: {}

  # Credentials. Password is auto-generated on first install via `lookup` +
  # `randAlphaNum 32`; on subsequent upgrades the existing Secret is re-used so
  # the value is stable. Override `auth.password` to provide a fixed value
  # (e.g. when restoring from backup).
  auth:
    username: njord
    database: njord
    password: ""

  # postgresql.conf overrides injected via ConfigMap.
  # Tuned for a 16GB db-control node hosting only Postgres.
  config:
    maxConnections: 50
    sharedBuffers: 128MB

  # Probe design:
  #   Startup:   pg_isready  — 10 × 5 s = 50 s budget for first start / WAL recovery
  #   Liveness:  pg_isready  — is postgres accepting connections? (process alive)
  #   Readiness: psql SELECT 1 — can postgres actually execute queries?
  # initialDelaySeconds=0 on liveness/readiness because startup handles the window.
  probes:
    startup:
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 10
    liveness:
      initialDelaySeconds: 0
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 3
