apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  labels:
    {{- include "njord-postgres.labels" . | nindent 4 }}
data:
  postgresql.conf: |
    # Generated by njord-postgres Helm chart — see values.yaml `postgres.config`.
    listen_addresses = '*'
    max_connections = {{ .Values.postgres.config.maxConnections }}
    shared_buffers = {{ .Values.postgres.config.sharedBuffers }}

    # Logging baseline — keep verbose enough for local dev debugging.
    log_min_duration_statement = 500
    log_connections = on
    log_disconnections = on
    log_timezone = 'UTC'

    # WAL + checkpoint settings tuned for single-node local dev (not HA).
    wal_level = replica
    max_wal_senders = 0
