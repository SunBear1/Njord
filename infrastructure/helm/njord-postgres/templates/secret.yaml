{{/*
Under ArgoCD `lookup` returns nil (repo-server has no cluster context), so
this template would emit a fresh randAlphaNum every reconcile and rotate the
DB password under our feet. Skip rendering when lookup misses; the secret is
seeded once by `infrastructure/local/install-argocd.sh` before bootstrap and
left untouched after that (Prune=false / IgnoreExtraneous annotations).
For standalone `helm install` (no ArgoCD) lookup works and the secret is
rendered as before.
*/}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace "postgres-secret") -}}
{{- if or .Values.postgres.auth.password $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    {{- include "njord-postgres.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
  POSTGRES_PASSWORD: {{ include "njord-postgres.password" . | quote }}
{{- end }}
