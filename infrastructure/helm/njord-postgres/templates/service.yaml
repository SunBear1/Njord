apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "njord-postgres.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "njord-postgres.selectorLabels" . | nindent 4 }}
