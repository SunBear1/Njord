apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "njord-frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "njord-frontend.selectorLabels" . | nindent 4 }}
