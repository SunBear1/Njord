# Default values for njord-frontend.
# Story 0.4 — React SPA served by nginx behind Traefik ingress.

frontend:
  image:
    # Local dev: image is built with `docker build -t njord-frontend:dev-<sha>`
    # and imported into k3d via `k3d image import`.
    # Epic 99: switch to `ghcr.io/sunbear1/njord-frontend` once GHCR push lands.
    repository: njord-frontend
    tag: "latest"
    # IfNotPresent keeps the locally-imported image; set to Never to be sure
    # the cluster never tries to pull from a registry for dev-tagged images.
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: true
    className: traefik
    host: njord.localhost
    annotations: {}
    # TLS disabled for local — Story 0.9 introduces cert-manager.
    tls: []

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # Pin SPA to the app node (mirrors planned OCI A1.Flex topology).
  nodeSelector:
    role: app

  tolerations: []
  affinity: {}

  probes:
    # Liveness: is the nginx process listening on port 80? tcpSocket is
    # intentionally cheaper than HTTP — it only fails if nginx crashes.
    # initialDelaySeconds=0 because startupProbe handles the slow-start window.
    liveness:
      tcpSocket:
        port: 80
      initialDelaySeconds: 0
      periodSeconds: 15
      timeoutSeconds: 2
      failureThreshold: 3
    # Readiness: can nginx serve an HTTP response? nginx.conf exposes /healthz
    # with a static 200 — removing the pod from Service endpoints if nginx is
    # reloading or in a broken state.
    readiness:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
    # Startup: 6 × 2 s = 12 s budget (nginx starts in < 1 s normally).
    startup:
      httpGet:
        path: /healthz
        port: http
      periodSeconds: 2
      timeoutSeconds: 2
      failureThreshold: 6
