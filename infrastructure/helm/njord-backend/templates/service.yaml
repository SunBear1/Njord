apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "njord-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "njord-backend.selectorLabels" . | nindent 4 }}
