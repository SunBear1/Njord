{{/*
JWT signing secret for /api/v1/auth/*. Generated once on first install via
`lookup`-based detection so existing sessions remain valid across upgrades.
Under ArgoCD `lookup` returns nil, so this template is skipped to avoid
randAlphaNum regenerating on every reconcile; the secret must be seeded
out-of-band by `infrastructure/local/install-argocd.sh`.
Operators can BYO a secret by setting backend.auth.existingSecret.
*/}}
{{- if not .Values.backend.auth.existingSecret -}}
{{- $name := .Values.backend.auth.jwtSecretName -}}
{{- $src := (lookup "v1" "Secret" .Release.Namespace $name) -}}
{{- if and $src $src.data (index $src.data "JWT_SECRET") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "njord-backend.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ index $src.data "JWT_SECRET" | quote }}
{{- end }}
{{- end }}
