apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    {{- include "njord-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "njord-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "njord-backend.labels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NJORD_BACKEND_ADDR
              value: ":8080"
            - name: NJORD_VERSION
              value: {{ .Values.backend.version | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.database.secretName }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.database.secretName }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.database.secretName }}
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ .Values.backend.database.host }}:{{ .Values.backend.database.port }}/$(POSTGRES_DB)?sslmode={{ .Values.backend.database.sslMode }}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default .Values.backend.auth.jwtSecretName .Values.backend.auth.existingSecret }}
                  key: JWT_SECRET
          livenessProbe:
            {{- toYaml .Values.backend.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.probes.readiness | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.backend.probes.startup | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
