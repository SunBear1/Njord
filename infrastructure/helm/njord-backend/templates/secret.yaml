{{/*
Mirror the postgres-secret from njord-data into the backend namespace so the
Deployment can reference it via secretKeyRef. Helm `lookup` reads the source
Secret at install/upgrade time; on a fresh cluster this template emits empty
data on the first dry-run (intentional — subsequent applies populate it).
*/}}
{{- $src := (lookup "v1" "Secret" .Values.backend.database.secretNamespace .Values.backend.database.secretName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.backend.database.secretName }}
  labels:
    {{- include "njord-backend.labels" . | nindent 4 }}
type: Opaque
data:
{{- if $src }}
  POSTGRES_USER: {{ index $src.data "POSTGRES_USER" | quote }}
  POSTGRES_PASSWORD: {{ index $src.data "POSTGRES_PASSWORD" | quote }}
  POSTGRES_DB: {{ index $src.data "POSTGRES_DB" | quote }}
{{- else }}
  POSTGRES_USER: ""
  POSTGRES_PASSWORD: ""
  POSTGRES_DB: ""
{{- end }}
